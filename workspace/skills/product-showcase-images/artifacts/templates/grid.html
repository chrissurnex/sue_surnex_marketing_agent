<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 16px; box-sizing: border-box; background: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
      .panel { width: 1168px; height: 868px; background: #0a0a0a; border: 1px solid #262626; border-radius: 24px; padding: 32px; }
      .card { background: #171717; border: 1px solid #262626; border-radius: 20px; }
      .grid-line { stroke: #262626; }
    </style>
  </head>
  <body>
    <main class="panel">
      <section class="grid grid-cols-[1.1fr_0.9fr] gap-5 h-full">
        <div class="card p-6 space-y-4">
          <div class="text-xl font-semibold text-neutral-100">Primary module</div>
          <svg viewBox="0 0 560 320" class="w-full"><line x1="0" y1="60" x2="560" y2="60" class="grid-line"/><line x1="0" y1="140" x2="560" y2="140" class="grid-line"/><line x1="0" y1="220" x2="560" y2="220" class="grid-line"/><path d="M0,250 C90,240 160,220 240,205 C320,190 410,155 560,96" fill="none" stroke="#a3e635" stroke-width="4"/></svg>
        </div>
        <div class="space-y-5">
          <div class="card p-6"><div class="text-xl font-semibold text-neutral-100 mb-4">Support metrics</div><div class="grid grid-cols-2 gap-4"><div><div class="text-sm text-neutral-500">Prompts</div><div class="text-4xl font-bold text-neutral-100">148</div></div><div><div class="text-sm text-neutral-500">Wins</div><div class="text-4xl font-bold text-lime-400">33</div></div></div></div>
          <div class="card p-6"><div class="text-xl font-semibold text-neutral-100 mb-4">Topics</div><div class="space-y-3 text-lg"><div class="flex justify-between"><span>AI Overviews</span><span>18%</span></div><div class="flex justify-between"><span>Brand queries</span><span>14%</span></div><div class="flex justify-between"><span>Comparisons</span><span>11%</span></div></div></div>
        </div>
      </section>
    </main>
  </body>
</html>
