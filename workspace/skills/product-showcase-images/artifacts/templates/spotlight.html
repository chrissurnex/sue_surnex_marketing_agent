<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotlight Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 16px; box-sizing: border-box; background: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
      .panel { width: 1168px; height: 868px; background: #0a0a0a; border: 1px solid #262626; border-radius: 24px; padding: 36px; }
      .card { background: #171717; border: 1px solid #262626; border-radius: 20px; }
      .grid-line { stroke: #262626; }
    </style>
  </head>
  <body>
    <main class="panel">
      <section class="grid grid-cols-[1.2fr_0.8fr] gap-5 h-full">
        <div class="card p-6 space-y-5">
          <div class="text-xl font-semibold text-neutral-100">Spotlight dashboard</div>
          <div class="grid grid-cols-3 gap-4">
            <div><div class="text-sm text-neutral-500">Tracked</div><div class="text-3xl font-bold text-neutral-100">24</div></div>
            <div><div class="text-sm text-neutral-500">Citations</div><div class="text-3xl font-bold text-neutral-100">91</div></div>
            <div><div class="text-sm text-neutral-500">Rate</div><div class="text-3xl font-bold text-lime-400">62%</div></div>
          </div>
          <svg viewBox="0 0 620 280" class="w-full"><line x1="0" y1="50" x2="620" y2="50" class="grid-line"/><line x1="0" y1="130" x2="620" y2="130" class="grid-line"/><line x1="0" y1="210" x2="620" y2="210" class="grid-line"/><path d="M0,220 C80,216 150,198 220,184 C300,166 380,132 470,108 C540,90 580,82 620,66" fill="none" stroke="#a3e635" stroke-width="4"/></svg>
        </div>
        <div class="space-y-5">
          <div class="card p-6"><div class="text-xl font-semibold text-neutral-100 mb-4">Priority gaps</div><div class="space-y-3 text-lg"><div class="flex justify-between"><span>Brand visibility</span><span>#4</span></div><div class="flex justify-between"><span>Comparison prompts</span><span>#6</span></div><div class="flex justify-between"><span>Topic clusters</span><span>#8</span></div></div></div>
          <div class="card p-6"><div class="text-xl font-semibold text-neutral-100 mb-4">Opportunity</div><div class="space-y-4"><div><div class="flex justify-between text-sm text-neutral-400 mb-2"><span>Trigger rate</span><span>74%</span></div><div class="h-3 rounded-full bg-neutral-800 overflow-hidden"><div class="h-full w-[74%] rounded-full bg-lime-400"></div></div></div><div><div class="flex justify-between text-sm text-neutral-400 mb-2"><span>Citation rate</span><span>62%</span></div><div class="h-3 rounded-full bg-neutral-800 overflow-hidden"><div class="h-full w-[62%] rounded-full bg-lime-400/80"></div></div></div></div></div>
        </div>
      </section>
    </main>
  </body>
</html>
