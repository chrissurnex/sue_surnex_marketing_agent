<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Surnex blog cover demos</title>
  <style>
    body { margin:0; background:#050709; color:#f4f7fa; font-family: Arial, Helvetica, sans-serif; }
    .wrap { width: 1720px; margin: 0 auto; padding: 36px 0 60px; }
    h1 { margin: 0 0 8px; font-size: 42px; }
    p { margin: 0 0 28px; color: #97A2AC; font-size: 22px; }
    .card { background:#0A1015; border:1px solid #1F2B33; border-radius:24px; padding:20px; margin:0 0 28px; }
    img { width: 1600px; display:block; border-radius:16px; }
    .label { font-size:18px; color:#B5FF48; margin:0 0 12px; letter-spacing:1.5px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Surnex blog cover demos</h1>
    <p>Three quick editorial directions using the approved dark UI-first visual system.</p>

    <div class="card">
      <div class="label">DEMO 1</div>
      <img src="blog-cover-demo-1-ai-search-signals.svg" alt="Demo 1" />
    </div>

    <div class="card">
      <div class="label">DEMO 2</div>
      <img src="blog-cover-demo-2-seo-ai-workflows.svg" alt="Demo 2" />
    </div>

    <div class="card">
      <div class="label">DEMO 3</div>
      <img src="blog-cover-demo-3-reporting-clients.svg" alt="Demo 3" />
    </div>
  </div>
</body>
</html>
